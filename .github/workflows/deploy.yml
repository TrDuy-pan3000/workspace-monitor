name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 147.182.134.43
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/olpai
            git pull origin main
            docker compose up -d --build backend
